<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salles - Réservation ÉTS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h1>🏫 Réservation ÉTS</h1>
    <div>
        <span id="userNom"></span>
        <a href="#" onclick="voirReservations()">Mes réservations</a>
        <a href="#" onclick="logout()">Déconnexion</a>
    </div>
</nav>

<div class="container">
    <h2 style="margin-top:30px; color:#003B71;">Salles disponibles</h2>
    <div id="sallesGrid" class="salles-grid"></div>
</div>

<!-- Modal réservation -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Réserver une salle</h3>
        <input type="date" id="dateReservation" />
        <input type="time" id="heureDebut" />
        <input type="time" id="heureFin" />
        <div id="modalMessage" class="message" style="display:none"></div>
        <div class="modal-buttons">
            <button onclick="confirmerReservation()">Confirmer</button>
            <button class="cancel" onclick="fermerModal()">Annuler</button>
        </div>
    </div>
</div>

<!-- Modal mes réservations -->
<div id="modalReservations" class="modal">
    <div class="modal-content" style="width:600px; max-width:95vw;">
        <h3>Mes réservations</h3>
        <div id="reservationsList"></div>
        <button class="cancel" style="margin-top:15px;" onclick="fermerModalReservations()">Fermer</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
